<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technical Skills</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1f233b, #3c4a7d);
      color: #f5f7ff;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .hero {
      text-align: center;
      padding: 60px 20px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 3rem;
      letter-spacing: 1px;
    }
    p {
      line-height: 1.75;
      color: #dce1ff;
    }
    .section {
      margin-top: 40px;
      padding: 30px;
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .section h2 {
      margin-top: 0;
      font-size: 1.8rem;
      color: #eef3ff;
    }
    .skills {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }
    .skill-item {
      padding: 18px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Technical Skills</h1>
      <p>Here are the technologies and tools I'm proficient in.</p>
    </div>
</body>
</html>
